    debt: `Track ${state.debts?.length || 0} debt${(state.debts?.length || 0) !== 1 ? "s" : ""} and plan your payoff strategy.`,
    networth: "Assets minus liabilities — your full financial picture.",
    subscriptions: "Track recurring charges and spot savings opportunities.",
    insights: "Trends, anomalies, and spending patterns from your data.",
    budget: "Set targets by category and track adherence.",
    health: "Your composite financial wellness score.",
    calendar: "Recurring income, bills, and subscriptions on a monthly calendar.",
    reports: "Export your data and generate summary reports.",
    import: "Import bank statements (CSV or PDF) or manage your seed file.",
    settings: "Manage categories, merchant rules, and app data."
  };

  content.appendChild(h("h1", { className: "page-title mb-2" }, titles[state.view]));
  content.appendChild(h("p", { className: "page-subtitle mb-8" }, subtitles[state.view]));

  if (state.view === "dashboard") content.appendChild(renderDashboard());
  else if (state.view === "transactions") content.appendChild(renderTransactions());
  else if (state.view === "goals") content.appendChild(renderGoals());
  else if (state.view === "debt") content.appendChild(renderDebt());
  else if (state.view === "networth") content.appendChild(renderNetWorth());
  else if (state.view === "subscriptions") content.appendChild(renderSubscriptions());
  else if (state.view === "insights") content.appendChild(renderInsights());
  else if (state.view === "budget") content.appendChild(renderBudget());
  else if (state.view === "health") content.appendChild(renderHealth());
  else if (state.view === "calendar") content.appendChild(renderCalendar());
  else if (state.view === "reports") { try { content.appendChild(renderReports()); } catch(e) { console.error("Reports crash:", e); content.appendChild(h("div", { className: "card", style: { padding: "24px", color: "var(--red)" } }, "Reports error: " + e.message + ". Try reloading the page.")); } }
  else if (state.view === "import") content.appendChild(renderImport());
  else if (state.view === "settings") content.appendChild(renderSettings());

  main.appendChild(content);
  return main;
}

// ─── Dashboard ───────────────────────────────────────────────────
// ─── Sankey Money Flow ───────────────────────────────────────────
function buildSankey(txns, dateRange) {
  const W = 2400, H = 560;
  const PAD = { top: 22, bottom: 10 };
  const COL_W = 14;
  const LABEL_SPACE = 200;
  // 4 columns: Income Sources | Accounts | Categories | Top Merchants
  const COL_X = [LABEL_SPACE, Math.round(W * 0.33 - COL_W/2), Math.round(W * 0.62 - COL_W/2), W - LABEL_SPACE - COL_W];
  const NODE_GAP = 4;

  const incomeTxns = txns.filter(t => isRealIncome(t));
  const expenseTxns = txns.filter(t => t.amount < 0);
  const refundTxns = txns.filter(t => t.amount > 0 && (isReturn(t) || isDebtPaymentCredit(t)));

  // Col 1: Income sources (merchants/descriptions)
  const incomeBySource = {};
  incomeTxns.forEach(t => { const src = extractMerchant(t.description) || "Other Income"; incomeBySource[src] = (incomeBySource[src] || 0) + t.amount; });

  // Track refunds by category (to net against expense categories)
  const refundsByCat = {};
  refundTxns.forEach(t => {
    // Try to attribute refund to original expense category
    let cat = t.category;
    // If it's a paired return, use the paired purchase's category
    if (t.returnPairId) {
      const pair = txns.find(x => x.returnPairId === t.returnPairId && x !== t);
      if (pair) cat = pair.category;
    }
    // Don't net debt payment credits against categories
    if (isDebtPaymentCredit(t)) return;
    if (REFUND_CATEGORIES.has(cat) || INCOME_CATEGORIES.has(cat)) cat = "Uncategorized";
    refundsByCat[cat] = (refundsByCat[cat] || 0) + t.amount;
  });

  // Col 2: Accounts — income flows into accounts, expenses flow out of accounts
  const incomeByAcct = {};
  incomeTxns.forEach(t => { const a = t.account || "Unknown"; incomeByAcct[a] = (incomeByAcct[a] || 0) + t.amount; });
  const expenseByAcct = {};
  expenseTxns.forEach(t => { const a = t.account || "Unknown"; expenseByAcct[a] = (expenseByAcct[a] || 0) + Math.abs(t.amount); });
  // Combine accounts for display (use the larger of income/expense to size the node)
  const allAccounts = new Set([...Object.keys(incomeByAcct), ...Object.keys(expenseByAcct)]);
  const acctFlow = {};
  allAccounts.forEach(a => { acctFlow[a] = Math.max(incomeByAcct[a] || 0, expenseByAcct[a] || 0); });

  // Col 3: Expense categories
  // Col 3: Expense categories (net of refunds)
  const spendByCat = {};
  expenseTxns.forEach(t => { spendByCat[t.category] = (spendByCat[t.category] || 0) + Math.abs(t.amount); });
  // Net refunds against their original categories
  for (const [cat, amt] of Object.entries(refundsByCat)) {
    if (spendByCat[cat]) spendByCat[cat] = Math.max(0, spendByCat[cat] - amt);
  }
  const totalRefunds = refundTxns.reduce((s, t) => s + t.amount, 0);

  // Col 4: Top merchants per category
  const merchantsByCat = {};
  expenseTxns.forEach(t => { if (!merchantsByCat[t.category]) merchantsByCat[t.category] = {}; const m = extractMerchant(t.description); merchantsByCat[t.category][m] = (merchantsByCat[t.category][m] || 0) + Math.abs(t.amount); });

  // Income→Account flow amounts
  const incSrcToAcct = {};
  incomeTxns.forEach(t => {
    const src = extractMerchant(t.description) || "Other Income";
    const a = t.account || "Unknown";
    const key = src + "|||" + a;
    incSrcToAcct[key] = (incSrcToAcct[key] || 0) + t.amount;
  });

  // Account→Category flow amounts
  const acctToCat = {};
  expenseTxns.forEach(t => {
    const a = t.account || "Unknown";
    const key = a + "|||" + t.category;
    acctToCat[key] = (acctToCat[key] || 0) + Math.abs(t.amount);
  });

  const totalIncome = Object.values(incomeBySource).reduce((s, v) => s + v, 0);
  const totalExpense = Object.values(spendByCat).reduce((s, v) => s + v, 0);
  if (Math.max(totalIncome, totalExpense) === 0) return h("p", {}, "No flow data");

  // Group small items
  const col1Raw = Object.entries(incomeBySource).sort((a, b) => b[1] - a[1]);
  const col1Top = col1Raw.slice(0, 6);
  const col1Rest = col1Raw.slice(6);
  if (col1Rest.length > 0) { const o = col1Rest.reduce((s,[,v])=>s+v,0); if (o > 0) col1Top.push(["Other Income", o]); }
  const col1 = col1Top;

  const col2Raw = Object.entries(acctFlow).sort((a, b) => b[1] - a[1]);
  const col2 = col2Raw.slice(0, 8);

  const col3Raw = Object.entries(spendByCat).sort((a, b) => b[1] - a[1]);
  const col3Top = col3Raw.slice(0, 8);
  const col3Rest = col3Raw.slice(8);
  if (col3Rest.length > 0) { const o = col3Rest.reduce((s,[,v])=>s+v,0); if (o > 0) col3Top.push(["Other", o]); }
  const col3 = col3Top;

  const col3Names = new Set(col3.map(([c])=>c));
  const col4Entries = [];
  for (const [cat, merchants] of Object.entries(merchantsByCat)) {
    if (!col3Names.has(cat)) continue;
    for (const [m, amt] of Object.entries(merchants).sort((a, b) => b[1] - a[1]).slice(0, 2))
      col4Entries.push({ merchant: m, amount: amt, category: cat });
  }
  col4Entries.sort((a, b) => b.amount - a.amount);
  const col4 = col4Entries.slice(0, 10);

  const usableH = H - PAD.top - PAD.bottom;
  function layoutColumn(items) {
    if (!items.length) return [];
    const total = items.reduce((s, [,v]) => s + v, 0);
    if (total <= 0) return items.map(([name, value], i) => ({ name, value, y: PAD.top + i * 8, h: 4 }));
    const scale = (usableH - (items.length - 1) * NODE_GAP) / total;
    const nodes = []; let y = PAD.top;
    for (const [name, value] of items) { const nh = Math.max(3, value * scale); nodes.push({ name, value, y, h: nh }); y += nh + NODE_GAP; }
    return nodes;
  }

  const nodes1 = layoutColumn(col1);
  const nodes2 = layoutColumn(col2);
  const nodes3 = layoutColumn(col3);
  const nodes4 = layoutColumn(col4.map(c => [c.merchant, c.amount]));
  nodes4.forEach((n, i) => { n.category = col4[i].category; });

  const palette = ["#6366F1","#10B981","#F59E0B","#EF4444","#8B5CF6","#EC4899","#14B8A6","#F97316","#3B82F6","#84CC16","#06B6D4","#D946EF"];
  const catColors = {};
  col3.forEach(([cat], i) => { catColors[cat] = palette[i % palette.length]; });
  const acctColors = {};
  col2.forEach(([acct], i) => { acctColors[acct] = palette[(i + 3) % palette.length]; });

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("width", "100%");
  svg.setAttribute("height", "100%");
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
  svg.style.display = "block";

  const svgWrap = document.createElement("div");
  svgWrap.style.cssText = `position:relative;width:100%;padding-bottom:${(H/W*100).toFixed(1)}%;`;
  const svgInner = document.createElement("div");
  svgInner.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;";
  svgWrap.appendChild(svgInner);

  const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
  let gradIdx = 0;

  function makeGrad(c1, c2) {
    const id = `sg${gradIdx++}`;
    const lg = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
    lg.setAttribute("id", id); lg.setAttribute("gradientUnits", "userSpaceOnUse");
    const s1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    s1.setAttribute("offset", "0%"); s1.setAttribute("stop-color", c1);
    const s2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    s2.setAttribute("offset", "100%"); s2.setAttribute("stop-color", c2);
    lg.appendChild(s1); lg.appendChild(s2); defs.appendChild(lg);
    return id;
  }

  function ribbon(x1, y1, h1, x2, y2, h2, c1, c2, amt, label) {
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.style.cursor = "default";
    const gradId = makeGrad(c1, c2);
    const grad = defs.querySelector(`#${gradId}`);
    grad.setAttribute("x1", x1); grad.setAttribute("y1", "0");
    grad.setAttribute("x2", x2); grad.setAttribute("y2", "0");
    const mx = (x1 + x2) / 2;
    const d = `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2} L${x2},${y2+h2} C${mx},${y2+h2} ${mx},${y1+h1} ${x1},${y1+h1} Z`;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    path.setAttribute("fill", `url(#${gradId})`);
    path.setAttribute("opacity", "0.22");
    path.setAttribute("stroke", "none");
    g.appendChild(path);
    g.addEventListener("mouseenter", () => { path.setAttribute("opacity", "0.45"); });
    g.addEventListener("mouseleave", () => { path.setAttribute("opacity", "0.22"); });
    const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
    title.textContent = `${label}: $${amt.toLocaleString(undefined,{maximumFractionDigits:0})}`;
    g.appendChild(title);
    return g;
  }

  // Draw flows Col1 (Income Sources) → Col2 (Accounts)
  const c1Off = nodes1.map(() => 0), c2Off_in = nodes2.map(() => 0);
  const col1Names = col1.map(([n]) => n), col2Names = col2.map(([n]) => n);
  for (let i = 0; i < nodes1.length; i++) {
    if (nodes1[i].value <= 0) continue;
    for (let j = 0; j < nodes2.length; j++) {
      // Actual flow from this source to this account
      let flow = 0;
      const srcName = nodes1[i].name;
      const acctName = nodes2[j].name;
      // Check direct flow data
      const key = srcName + "|||" + acctName;
      flow = incSrcToAcct[key] || 0;
      // If "Other Income" aggregate, distribute proportionally
      if (srcName === "Other Income" && col1Rest.length > 0) {
        for (const [restSrc] of col1Rest) {
          const rKey = restSrc + "|||" + acctName;
          flow += incSrcToAcct[rKey] || 0;
        }
      }
      if (flow <= 0) continue;
      const fh1 = (flow / nodes1[i].value) * nodes1[i].h;
      const fh2 = (flow / nodes2[j].value) * nodes2[j].h;
      if (fh1 < 0.5 || fh2 < 0.5) continue;
      svg.appendChild(ribbon(
        COL_X[0]+COL_W, nodes1[i].y+c1Off[i], fh1,
        COL_X[1], nodes2[j].y+c2Off_in[j], fh2,
        "#10B981", acctColors[acctName]||"#6B7280", flow, `${srcName} → ${acctName}`
      ));
      c1Off[i] += fh1; c2Off_in[j] += fh2;
    }
  }

  // Draw flows Col2 (Accounts) → Col3 (Categories)
  const c2Off_out = nodes2.map(() => 0), c3Off = nodes3.map(() => 0);
  for (let j = 0; j < nodes2.length; j++) {
    for (let k = 0; k < nodes3.length; k++) {
      const acctName = nodes2[j].name;
      const catName = nodes3[k].name;
      let flow = 0;
      const key = acctName + "|||" + catName;
      flow = acctToCat[key] || 0;
      // For "Other" category bucket, sum remaining
      if (catName === "Other" && col3Rest.length > 0) {
        for (const [restCat] of col3Rest) {
          const rKey = acctName + "|||" + restCat;
          flow += acctToCat[rKey] || 0;
        }
      }
      if (flow <= 0) continue;
      const fh2 = (flow / nodes2[j].value) * nodes2[j].h;
      const fh3 = (flow / nodes3[k].value) * nodes3[k].h;
      if (fh2 < 0.5 || fh3 < 0.5) continue;
      svg.appendChild(ribbon(
        COL_X[1]+COL_W, nodes2[j].y+c2Off_out[j], fh2,
        COL_X[2], nodes3[k].y+c3Off[k], fh3,
        acctColors[acctName]||"#6B7280", catColors[catName]||"#9CA3AF", flow, `${acctName} → ${catName}`
      ));
      c2Off_out[j] += fh2; c3Off[k] += fh3;
    }
  }

  // Draw flows Col3 (Categories) → Col4 (Top Merchants)
  const c3Off2 = nodes3.map(() => 0), c4Off = nodes4.map(() => 0);
  for (let k = 0; k < nodes3.length; k++) {
    for (let m = 0; m < nodes4.length; m++) {
      if (nodes4[m].category !== nodes3[k].name || nodes3[k].value <= 0) continue;
      const fh3 = (nodes4[m].value / nodes3[k].value) * nodes3[k].h;
      const color = catColors[nodes3[k].name]||"#9CA3AF";
      svg.appendChild(ribbon(
        COL_X[2]+COL_W, nodes3[k].y+c3Off2[k], fh3,
        COL_X[3], nodes4[m].y+c4Off[m], nodes4[m].h,
        color, color, nodes4[m].value, `${nodes3[k].name} → ${nodes4[m].name}`
      ));
      c3Off2[k] += fh3; c4Off[m] += nodes4[m].h;
    }
  }

  svg.appendChild(defs);

  // Draw node bars
  function drawNode(x, node, color, clickAction, opts = {}) {
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    if (clickAction) g.style.cursor = "pointer";
    const labelSide = opts.labelSide || "right";
    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("x", x); rect.setAttribute("y", node.y);
    rect.setAttribute("width", COL_W); rect.setAttribute("height", Math.max(2, node.h));
    rect.setAttribute("rx", COL_W/2); rect.setAttribute("fill", color);
    rect.setAttribute("opacity", "0.85");
    g.appendChild(rect);
    const lbl = document.createElementNS("http://www.w3.org/2000/svg", "text");
    if (labelSide === "left") {
      lbl.setAttribute("x", x - 10); lbl.setAttribute("text-anchor", "end");
    } else {
      lbl.setAttribute("x", x + COL_W + 10); lbl.setAttribute("text-anchor", "start");
    }
    lbl.setAttribute("y", node.y + Math.max(2, node.h)/2 + 5);
    lbl.setAttribute("font-size", "14"); lbl.setAttribute("fill", "#4B5563");
    lbl.setAttribute("font-family", "'DM Sans',sans-serif");
    lbl.textContent = (node.name.length > 22 ? node.name.slice(0,20)+"…" : node.name);
    g.appendChild(lbl);
    const amt = document.createElementNS("http://www.w3.org/2000/svg", "text");
    if (labelSide === "left") {
      amt.setAttribute("x", x - 7); amt.setAttribute("text-anchor", "end");
    } else {
      amt.setAttribute("x", x + COL_W + 7); amt.setAttribute("text-anchor", "start");
    }
    amt.setAttribute("y", node.y + Math.max(2, node.h)/2 + 14);
    amt.setAttribute("font-size", "10"); amt.setAttribute("fill", "#9CA3AF");
    amt.setAttribute("font-family", "'JetBrains Mono',monospace");
    amt.textContent = node.value >= 1000 ? `$${(node.value/1000).toFixed(1)}K` : `$${node.value.toFixed(0)}`;
    g.appendChild(amt);
    if (clickAction) {
      g.addEventListener("mouseenter", () => { rect.setAttribute("opacity", "1"); lbl.setAttribute("fill", color); lbl.setAttribute("font-weight", "700"); });
      g.addEventListener("mouseleave", () => { rect.setAttribute("opacity", "0.85"); lbl.setAttribute("fill", "#4B5563"); lbl.setAttribute("font-weight", "400"); });
      g.addEventListener("click", clickAction);
    }
    svg.appendChild(g);
  }

  // Click-through filtering with date range from dashboard period
  const dr = dateRange || { from: "", to: "" };
  function sankeyNav(opts) {
    state.view = "transactions";
    if (opts.search) state._txnSearch = opts.search;
    if (opts.cat) state._txnFilterCat = opts.cat;
    if (dr.from) state._txnDateFrom = dr.from;
    if (dr.to) state._txnDateTo = dr.to;
    render();
  }

  for (const n of nodes1) drawNode(COL_X[0], n, "#10B981", () => {
    sankeyNav({ search: n.name });
  }, { labelSide: "left" });
  for (const n of nodes2) drawNode(COL_X[1], n, acctColors[n.name]||"#6B7280", () => {
    sankeyNav({ search: n.name });
  });
  for (const n of nodes3) drawNode(COL_X[2], n, catColors[n.name]||"#6B7280", n.name !== "Other" ? () => {
    sankeyNav({ cat: n.name });
  } : null);
  for (const n of nodes4) drawNode(COL_X[3], n, catColors[n.category]||"#9CA3AF", () => {
    sankeyNav({ search: n.name });
  });

  // Column headers
  for (const [text, x] of [["Income Sources",COL_X[0]],["Accounts",COL_X[1]],["Categories",COL_X[2]],["Top Merchants",COL_X[3]]]) {
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", x+COL_W/2); t.setAttribute("y", PAD.top - 6);
    t.setAttribute("text-anchor", "middle"); t.setAttribute("font-size", "14");
    t.setAttribute("font-weight", "600"); t.setAttribute("fill", "#1F2937");
    t.setAttribute("font-family", "'DM Sans',sans-serif");
    t.textContent = text; svg.appendChild(t);
  }

  svgInner.appendChild(svg);

  // Refunds & Returns summary below chart
  if (totalRefunds > 0) {
    const refBar = document.createElement("div");
    refBar.style.cssText = "display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:10px 16px;margin-top:8px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);border-radius:10px;font-size:12px;";
    const refIcon = document.createElement("span");
    refIcon.textContent = "↩"; refIcon.style.cssText = "font-size:16px;"; refBar.appendChild(refIcon);
    const refLabel = document.createElement("span");
    refLabel.style.cssText = "font-weight:600;color:#0891B2;";
    refLabel.textContent = "Refunds & Returns: +$" + totalRefunds.toLocaleString(undefined,{maximumFractionDigits:0}) + " recovered";
    refBar.appendChild(refLabel);
    const refDetail = document.createElement("span");
    refDetail.style.cssText = "color:#6B7280;font-size:11px;";
    const refCats = Object.entries(refundsByCat).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
    if (refCats.length > 0) {
      refDetail.textContent = "Netted against: " + refCats.map(([c,v]) => c + " (-$" + v.toLocaleString(undefined,{maximumFractionDigits:0}) + ")").join(", ");
    }
    refBar.appendChild(refDetail);
    // Show refund transaction count
    const refCount = document.createElement("span");
    refCount.style.cssText = "margin-left:auto;color:#0891B2;font-size:11px;font-weight:500;";
    refCount.textContent = refundTxns.length + " transaction" + (refundTxns.length !== 1 ? "s" : "");
    refBar.appendChild(refCount);
    svgWrap.appendChild(refBar);
  }

  return svgWrap;
}

function renderDashboard() {
  const wrap = h("div");
  const allTxns = state.transactions;
  if (allTxns.length === 0) {
    const empty = h("div", { className: "empty" });
    const ic = h("div", { className: "empty-icon" }); ic.appendChild(icon(ICONS.import)); empty.appendChild(ic);
    empty.appendChild(h("h2", {}, "No transactions yet"));
    empty.appendChild(h("p", {}, "Import a CSV, PDF bank statement, or JSON seed file to get started."));
    wrap.appendChild(empty); return wrap;
  }

  // Period filter
  const now = new Date();
  const thisMonthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const lastMonth = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastMonthStr = `${lastMonth.getFullYear()}-${String(lastMonth.getMonth()+1).padStart(2,"0")}`;
  const threeMonthsAgo = new Date(now.getFullYear(), now.getMonth()-2, 1);
  const threeMonthsStr = `${threeMonthsAgo.getFullYear()}-${String(threeMonthsAgo.getMonth()+1).padStart(2,"0")}`;
  const ytdStr = `${now.getFullYear()}-01`;

  // Find all years with transaction data
  const yearsWithData = [...new Set(allTxns.map(t => t.date?.slice(0, 4)).filter(Boolean))].sort().reverse();

  const periods = [
    { id: "thisMonth", label: "This Month" },
    { id: "lastMonth", label: "Last Month" },
    { id: "3months", label: "3 Months" },
    { id: "ytd", label: "YTD" },
    { id: "all", label: "All Time" },
  ];
  // Add individual year tabs
  for (const y of yearsWithData) {
    // Skip current year if already covered by YTD
    if (y === String(now.getFullYear())) continue;
    periods.push({ id: "year-" + y, label: y });
  }
  const tabs = h("div", { className: "period-tabs", style: { flexWrap: "wrap" } });
  for (const p of periods) {
    const btn = h("button", { className: `period-tab${state.dashPeriod === p.id ? " active" : ""}`, onClick: () => { state.dashPeriod = p.id; render(); } });
    btn.textContent = p.label; tabs.appendChild(btn);
  }
  wrap.appendChild(tabs);

  // Filter transactions by period
  function filterByPeriod(txns) {

  }
  const txns = filterByPeriod(allTxns);

  const returnTxns = txns.filter(t => isReturn(t));

  const totalInc = income.reduce((s, t) => s + t.amount, 0);

  const net = totalInc - totalExp;

  const savingsRate = totalInc > 0 ? ((totalInc - totalExp) / totalInc * 100) : 0;

  }
  const expTrend = prevExp > 0 ? ((totalExp - prevExp) / prevExp * 100) : null;

  // ── Quick Actions ──

  qaRow.appendChild(mkQa("Import Data", ICONS.import, () => { state.view = "import"; render(); }));
  if (state.savingsGoals.length > 0) qaRow.appendChild(mkQa("Log Contribution", ICONS.plus, () => { state.view = "goals"; render(); }));
  if (state.assets.length > 0 || state.debts.length > 0) qaRow.appendChild(mkQa("Take Snapshot", ICONS.networth, () => { state.view = "networth"; render(); }));
  qaRow.appendChild(mkQa("Add Debt", ICONS.debt, () => { state.view = "debt"; render(); }));
  wrap.appendChild(qaRow);

  // ── Stat Cards ──
  const statRow = h("div", { className: "stat-row" });

  statRow.appendChild(mkStat("Income", `+${fmt(totalInc)}`, `${income.length} deposits`, "positive"));
  const expSub = expTrend !== null ? `${expTrend > 0 ? "▲" : "▼"} ${Math.abs(expTrend).toFixed(0)}% vs last month` : `${expenses.length} charges`;

  // ── Income vs Expenses Monthly Chart ──

  const months = Object.keys(monthly).sort();

    for (const m of months) {

      const col = h("div", { style: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "4px" } });

      const expBar = h("div", { style: { flex: 1, height: `${expH}px`, background: d.net >= 0 ? "#E5E7EB" : "#FCA5A5", borderRadius: "3px 3px 0 0", transition: "height 0.4s", cursor: "pointer" } });
      expBar.title = `${m} Expenses: $${d.exp.toFixed(0)}`;
      barsWrap.appendChild(incBar);
      barsWrap.appendChild(expBar);
      col.appendChild(barsWrap);

      // Month label
      const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

      col.appendChild(h("span", { style: { fontSize: "10px", color: "var(--gray-400)" } }, labelText));
      chart.appendChild(col);
    }
    trendCard.appendChild(chart);

    // Legend + net line summary
    const footer = h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "12px" } });
    const legend = h("div", { style: { display: "flex", gap: "16px" } });
    legend.innerHTML = `<span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500)"><span style="width:10px;height:10px;border-radius:3px;background:#10B981"></span>Income</span><span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500)"><span style="width:10px;height:10px;border-radius:3px;background:#E5E7EB"></span>Expenses</span><span style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500)"><span style="width:10px;height:10px;border-radius:3px;background:#FCA5A5"></span>Over budget</span>`;
    footer.appendChild(legend);
    // Show avg monthly spend
    const avgMonthlyExp = months.length > 0 ? Object.values(monthly).reduce((s,m) => s + m.exp, 0) / months.length : 0;
    footer.appendChild(h("span", { style: { fontSize: "12px", color: "var(--gray-500)" } }, `Avg: ${fmt(avgMonthlyExp)}/mo`));
    trendCard.appendChild(footer);
    wrap.appendChild(trendCard);
  }

  // ── Spending Velocity (daily spend this month as sparkline) ──
  if (state.dashPeriod === "thisMonth" || state.dashPeriod === "all") {
    const currentMonth = thisMonthStr;
    const dailySpend = {};
    allTxns.filter(t => t.date?.slice(0,7) === currentMonth && t.amount < 0 && !isTransfer(t)).forEach(t => {
      const day = t.date.slice(8, 10);
      dailySpend[day] = (dailySpend[day] || 0) + Math.abs(t.amount);
    });
    const days = Object.keys(dailySpend).sort();
    if (days.length >= 3) {
      const velCard = h("div", { className: "card mb-4" });
      velCard.appendChild(h("h3", { className: "text-sm font-semibold mb-2", style: { color: "var(--gray-700)" } }, "Daily Spending This Month"));

      // Running total line
      let running = 0;
      const runData = days.map(d => { running += dailySpend[d]; return { day: d, daily: dailySpend[d], running }; });
      const maxRunning = running;
      const sparkH = 80;
      const sparkW = 100; // percentage

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", `0 0 ${days.length * 20} ${sparkH}`);
      svg.setAttribute("width", "100%"); svg.setAttribute("height", sparkH + "px");
      svg.style.overflow = "visible";

      // Running total area
      let pathD = `M0,${sparkH}`;
      runData.forEach((d, i) => {
        const x = (i / (days.length - 1)) * (days.length * 20 - 20) + 10;
        const y = sparkH - (d.running / maxRunning) * (sparkH - 10);
        pathD += ` L${x},${y}`;
      });
      pathD += ` L${(days.length - 1) / (days.length - 1) * (days.length * 20 - 20) + 10},${sparkH} Z`;
      const area = document.createElementNS("http://www.w3.org/2000/svg", "path");
      area.setAttribute("d", pathD); area.setAttribute("fill", "rgba(27,58,92,0.08)"); area.setAttribute("stroke", "none");
      svg.appendChild(area);

      // Line
      let lineD = "";
      runData.forEach((d, i) => {
        const x = (i / (days.length - 1)) * (days.length * 20 - 20) + 10;
        const y = sparkH - (d.running / maxRunning) * (sparkH - 10);
        lineD += `${i === 0 ? "M" : " L"}${x},${y}`;
      });
      const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
      line.setAttribute("d", lineD); line.setAttribute("fill", "none"); line.setAttribute("stroke", "#1B3A5C"); line.setAttribute("stroke-width", "2");
      svg.appendChild(line);

      // Dots

      velFooter.appendChild(h("span", { style: { fontSize: "12px", fontWeight: "600", color: "var(--navy)" } }, `Running total: ${fmt(running)}`));
      velFooter.appendChild(h("span", { style: { fontSize: "11px", color: "var(--gray-400)" } }, `Day ${days[days.length-1]}`));
      velCard.appendChild(velFooter);
      wrap.appendChild(velCard);

  }

  // ── Savings Goals Summary ──
  const goals = state.savingsGoals || [];
  if (goals.length > 0) {

    const goalsHeader = h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" } });

    const viewAllBtn = h("button", { style: { background: "none", border: "none", cursor: "pointer", fontSize: "13px", color: "var(--blue)", fontFamily: "inherit", fontWeight: "500" }, onClick: () => { state.view = "goals"; render(); } });
    viewAllBtn.textContent = "Manage Goals →"; goalsHeader.appendChild(viewAllBtn);

      row.appendChild(meta);

    wrap.appendChild(goalsSection);

  wrap.appendChild(h("p", { className: "text-xs text-center mt-4", style: { color: "var(--gray-400)" } }, `${txns.length} transactions in this view · ${allTxns.length} total`));
  return wrap;
}

// ─── Transactions ────────────────────────────────────────────────

  const wrap = h("div");
  let search = state._txnSearch || "", filterCat = state._txnFilterCat || "All", filterAcct = "All", sortField = "date", sortDir = "desc", page = 0, editingId = null, expandedId = null, bulkMerchant = null, bulkCat = "";
  let dateFrom = state._txnDateFrom || "", dateTo = state._txnDateTo || "";

    r.sort((a, b) => { let va = a[sortField], vb = b[sortField]; if (sortField === "amount") { va = +va; vb = +vb; } if (va < vb) return sortDir === "asc" ? -1 : 1; if (va > vb) return sortDir === "asc" ? 1 : -1; return 0; });
    return r;

          // Sort by closest amount match first, then closest date
          const amtDiffA = Math.abs(Math.abs(a.amount) - Math.abs(txn.amount));
          const amtDiffB = Math.abs(Math.abs(b.amount) - Math.abs(txn.amount));
          if (amtDiffA !== amtDiffB) return amtDiffA - amtDiffB;
          const d0 = new Date(txn.date).getTime();
          return Math.abs(new Date(a.date).getTime() - d0) - Math.abs(new Date(b.date).getTime() - d0);
        }).slice(0, 20);
      }

      // Auto-match all button
      const autoBtn = h("button", { className: "btn btn-sm", style: { fontSize: "11px", padding: "5px 12px", marginBottom: "12px", background: "var(--blue)", color: "white", border: "none", borderRadius: "8px", fontWeight: "600" }, onClick: async () => {
        let matched = 0;
        const used = new Set();
        for (const t of unmatched) {
          if (used.has(t)) continue;
          const exact = findTransferCandidates(t, state.transactions);
          if (exact.length > 0 && !used.has(exact[0])) {
            const i1 = state.transactions.indexOf(t);
            const i2 = state.transactions.indexOf(exact[0]);
            if (i1 >= 0 && i2 >= 0) {
              await linkTransferPair(i1, i2);
              used.add(t); used.add(exact[0]);
              matched++;
            }
          }
        }
        if (matched > 0) { rebuild(); } else { alert("No exact matches found to auto-link."); }
      }});
      autoBtn.textContent = "⚡ Auto-Match All Exact Pairs";
      trCard.appendChild(autoBtn);

      for (const t of unmatched.slice(0, 15)) {
        const exactCandidates = findTransferCandidates(t, state.transactions);
        const bestGuesses = exactCandidates.length === 0 ? findBestGuess(t) : [];

        const row = h("div", { style: { padding: "10px 0", borderBottom: "1px solid var(--gray-50)", display: "flex", flexWrap: "wrap", alignItems: "center", gap: "8px" } });

        // Transaction info
        const info = h("div", { style: { flex: "1", minWidth: "200px" } });
        const topLine = h("div", { style: { display: "flex", gap: "8px", alignItems: "center", marginBottom: "2px" } });
        topLine.appendChild(h("span", { style: { fontSize: "12px", color: "var(--gray-500)", fontFamily: "'JetBrains Mono',monospace" } }, t.date));
        topLine.appendChild(h("span", { style: { fontSize: "13px", fontWeight: "500", color: "var(--gray-800)" } }, t.description));
        info.appendChild(topLine);
        const botLine = h("div", { style: { display: "flex", gap: "8px", alignItems: "center", fontSize: "11px", color: "var(--gray-400)" } });
        botLine.appendChild(h("span", {}, t.account || "—"));
        botLine.appendChild(h("span", { style: { fontWeight: "600", color: t.amount >= 0 ? "var(--green)" : "var(--red)" } }, `${t.amount >= 0 ? "+" : ""}$${Math.abs(t.amount).toLocaleString()}`));
        info.appendChild(botLine);
        row.appendChild(info);

        // Action buttons
        const actions = h("div", { style: { display: "flex", gap: "4px", alignItems: "center", flexWrap: "wrap" } });

        if (exactCandidates.length > 0) {
          // Exact match - show link button with candidate info
          const c = exactCandidates[0];
          const linkBtn = h("button", { className: "btn btn-sm", style: { fontSize: "11px", padding: "4px 10px", background: "#059669", color: "white", border: "none", borderRadius: "8px" }, onClick: async () => {
            const i1 = state.transactions.indexOf(t);
            const i2 = state.transactions.indexOf(c);
            if (i1 >= 0 && i2 >= 0) { await linkTransferPair(i1, i2); rebuild(); }
          }});
          linkBtn.textContent = `✓ Link → ${c.account} (${c.date})`;
          actions.appendChild(linkBtn);
          if (exactCandidates.length > 1) {
            actions.appendChild(h("span", { style: { fontSize: "10px", color: "var(--gray-400)" } }, `+${exactCandidates.length - 1} more`));
          }
        } else if (bestGuesses.length > 0) {
          // Best guess - same amount but different date window
          const bg = bestGuesses[0];
          const daysDiff = Math.round(Math.abs(new Date(t.date) - new Date(bg.date)) / 86400000);
          const guessBtn = h("button", { className: "btn btn-sm", style: { fontSize: "11px", padding: "4px 10px", background: "#F59E0B", color: "white", border: "none", borderRadius: "8px" }, onClick: async () => {
            const i1 = state.transactions.indexOf(t);
            const i2 = state.transactions.indexOf(bg);
            if (i1 >= 0 && i2 >= 0) { await linkTransferPair(i1, i2); rebuild(); }
          }});
          guessBtn.textContent = `🔮 Best Guess → ${bg.account} (${bg.date}, ${daysDiff}d apart)`;
          actions.appendChild(guessBtn);
          if (bestGuesses.length > 1) {
            // Dropdown for other guesses
            const moreBtn = h("button", { className: "btn btn-sm btn-outline", style: { fontSize: "10px", padding: "3px 6px" }, onClick: () => {
              showManualPairModal(t, bestGuesses);
            }});
            moreBtn.textContent = `+${bestGuesses.length - 1}`;
            actions.appendChild(moreBtn);
          }
        } else {
          // No guess - show manual pair button
          actions.appendChild(h("span", { style: { fontSize: "11px", color: "var(--gray-400)", marginRight: "4px" } }, "No match"));
        }

        // Always show manual pair button
        const manualBtn = h("button", { className: "btn btn-sm btn-outline", style: { fontSize: "10px", padding: "3px 8px" }, onClick: () => {
          showManualPairModal(t, findManualCandidates(t));
        }});
        manualBtn.textContent = "🔗 Manual Pair";
        actions.appendChild(manualBtn);

        // Dismiss button (mark as not-a-transfer)
        const dismissBtn = h("button", { className: "btn btn-sm btn-outline", style: { fontSize: "10px", padding: "3px 8px", color: "var(--gray-400)" }, onClick: async () => {
          const idx = state.transactions.indexOf(t);
          if (idx >= 0) {
            state.transactions[idx].transferPairId = "dismissed";
            await persist("transactions", state.transactions);
            rebuild();
          }
        }});
        dismissBtn.textContent = "✕ Not a transfer";
        actions.appendChild(dismissBtn);

        row.appendChild(actions);
        trCard.appendChild(row);
      }
      if (unmatched.length > 15) trCard.appendChild(h("p", { style: { fontSize: "11px", color: "var(--gray-400)", marginTop: "8px" } }, `+ ${unmatched.length - 15} more`));
      wrap.appendChild(trCard);
    }

    // Manual pair modal
    function showManualPairModal(srcTxn, candidates) {
      const overlay = h("div", { className: "modal-overlay" });
      const modal = h("div", { className: "modal", style: { maxWidth: "700px", maxHeight: "80vh", overflow: "auto" } });
      modal.appendChild(h("h2", { style: { fontSize: "16px", fontWeight: "600", marginBottom: "4px" } }, "🔗 Select Transfer Match"));

      // Show source transaction
      const srcBox = h("div", { style: { background: "var(--gray-50)", borderRadius: "10px", padding: "12px", marginBottom: "16px" } });
      srcBox.appendChild(h("div", { style: { fontSize: "11px", color: "var(--gray-400)", marginBottom: "4px" } }, "Match a pair for:"));
      srcBox.appendChild(h("div", { style: { fontSize: "14px", fontWeight: "600", color: "var(--gray-800)" } }, `${srcTxn.description}`));
      srcBox.appendChild(h("div", { style: { fontSize: "12px", color: "var(--gray-500)", marginTop: "2px" } }, `${srcTxn.date} · ${srcTxn.account} · ${srcTxn.amount >= 0 ? "+" : ""}$${Math.abs(srcTxn.amount).toLocaleString()}`));
      modal.appendChild(srcBox);

      if (candidates.length === 0) {
        modal.appendChild(h("p", { style: { color: "var(--gray-500)", fontSize: "13px", textAlign: "center", padding: "20px" } }, "No candidates found from different accounts with opposite sign."));
      } else {
        modal.appendChild(h("div", { style: { fontSize: "11px", color: "var(--gray-400)", marginBottom: "8px" } }, `${candidates.length} candidates (sorted by closest amount, then date):`));
        for (const c of candidates) {
          const amtDiff = Math.abs(Math.abs(c.amount) - Math.abs(srcTxn.amount));
          const daysDiff = Math.round(Math.abs(new Date(srcTxn.date) - new Date(c.date)) / 86400000);
          const isExact = amtDiff < 0.02;

          const cRow = h("div", { style: {
            display: "flex", alignItems: "center", gap: "10px", padding: "10px 12px", marginBottom: "4px",
            borderRadius: "10px", border: `1.5px solid ${isExact ? "#A7F3D0" : "var(--gray-100)"}`,
            background: isExact ? "#ECFDF520" : "transparent", cursor: "pointer", transition: "all 0.15s",
          }});
          cRow.addEventListener("mouseenter", () => { cRow.style.background = "var(--gray-50)"; cRow.style.borderColor = "var(--blue)"; });
          cRow.addEventListener("mouseleave", () => { cRow.style.background = isExact ? "#ECFDF520" : "transparent"; cRow.style.borderColor = isExact ? "#A7F3D0" : "var(--gray-100)"; });

          const cInfo = h("div", { style: { flex: "1", minWidth: "0" } });
          const cTop = h("div", { style: { display: "flex", gap: "8px", alignItems: "center", marginBottom: "2px" } });
          cTop.appendChild(h("span", { style: { fontSize: "12px", fontFamily: "'JetBrains Mono',monospace", color: "var(--gray-500)" } }, c.date));
          cTop.appendChild(h("span", { style: { fontSize: "13px", fontWeight: "500", color: "var(--gray-800)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, c.description));
          cInfo.appendChild(cTop);
          const cBot = h("div", { style: { display: "flex", gap: "10px", fontSize: "11px", color: "var(--gray-400)" } });
          cBot.appendChild(h("span", {}, c.account));
          cBot.appendChild(h("span", { style: { fontWeight: "600", color: c.amount >= 0 ? "var(--green)" : "var(--red)" } }, `${c.amount >= 0 ? "+" : ""}$${Math.abs(c.amount).toLocaleString()}`));
          if (isExact) cBot.appendChild(h("span", { style: { color: "#059669", fontWeight: "600" } }, "✓ Exact amount"));
          else cBot.appendChild(h("span", {}, `Δ $${amtDiff.toFixed(2)}`));
          cBot.appendChild(h("span", {}, `${daysDiff}d apart`));
          cInfo.appendChild(cBot);
          cRow.appendChild(cInfo);

          const pairBtn = h("button", { className: "btn btn-sm", style: { fontSize: "11px", padding: "5px 12px", background: isExact ? "#059669" : "var(--blue)", color: "white", border: "none", borderRadius: "8px", fontWeight: "600", flexShrink: "0" }, onClick: async () => {
            const i1 = state.transactions.indexOf(srcTxn);
            const i2 = state.transactions.indexOf(c);
            if (i1 >= 0 && i2 >= 0) { await linkTransferPair(i1, i2); overlay.remove(); rebuild(); }
          }});
          pairBtn.textContent = "Link";
          cRow.appendChild(pairBtn);
          modal.appendChild(cRow);
        }
      }

      const closeBtn = h("button", { className: "btn btn-outline", style: { width: "100%", marginTop: "12px" }, onClick: () => overlay.remove() });
      closeBtn.textContent = "Cancel";
      modal.appendChild(closeBtn);
      overlay.appendChild(modal); document.body.appendChild(overlay);
    }
  }

  rebuild();
  return wrap;
}

function renderGoals() {

  const topBar = h("div", { style: { display: "flex", justifyContent: "flex-end", gap: "8px", marginBottom: "24px" } });

  return wrap;

function renderGoalCard(g, goalIndex, totalGoals) {
  const prog = calcGoalProgress(g, state.transactions);

  const card = h("div", { className: "card mb-4" });

  // Header

  nameRow.appendChild(h("div", { style: { width: "12px", height: "12px", borderRadius: "50%", background: g.color || "var(--navy)" } }));

    left.appendChild(linkBadge);
  }
  // Badges row

  // Projected completion
  const projDate = calcProjectedCompletion(g);
  if (projDate && pct < 100) {
    badges.appendChild(h("div", { className: "completion-badge" }, `📅 Est. ${projDate}`));
  }
  // Target date
  if (g.targetDate && pct < 100) {
    const target = new Date(g.targetDate);

  }
  // Monthly allocation needed

  if (allocNeeded !== null && allocNeeded > 0 && pct < 100) {
    badges.appendChild(h("div", { className: "alloc-needed" }, `💰 Need $${allocNeeded.toLocaleString()}/mo`));
  }
  if (badges.children.length > 0) left.appendChild(badges);
  header.appendChild(left);

  const actions = h("div", { style: { display: "flex", gap: "4px", alignItems: "center" } });
  // Priority arrows
  const arrows = h("div", { className: "priority-arrows" });
  const upBtn = h("button", { disabled: goalIndex === 0, title: "Move up", onClick: async () => {
    const goals = [...state.savingsGoals]; const temp = goals[goalIndex]; goals[goalIndex] = goals[goalIndex - 1]; goals[goalIndex - 1] = temp;
    await persistGoals(goals); render();
  }}); upBtn.textContent = "▲"; arrows.appendChild(upBtn);
  const downBtn = h("button", { disabled: goalIndex >= totalGoals - 1, title: "Move down", onClick: async () => {
    const goals = [...state.savingsGoals]; const temp = goals[goalIndex]; goals[goalIndex] = goals[goalIndex + 1]; goals[goalIndex + 1] = temp;
    await persistGoals(goals); render();
  }}); downBtn.textContent = "▼"; arrows.appendChild(downBtn);
  actions.appendChild(arrows);
  const editBtn = h("button", { className: "cat-btn", title: "Edit goal", onClick: () => showGoalModal(g) });

  labels.appendChild(h("span", { className: "tabnum", style: { fontSize: "14px", color: "var(--gray-400)" } }, `$${g.targetAmount.toLocaleString()} target`));

function renderOverviewTab(container, g, prog) {

  };
  breakdown.appendChild(mkBox("Starting Balance", g.currentAmount));
  breakdown.appendChild(mkBox("Manual", prog.manual, "var(--navy)"));

    container.appendChild(h("div", { style: { fontSize: "13px", color: "var(--gray-500)", marginBottom: "16px" } },

    const amt = parseFloat(contribAmt.value);

  container.appendChild(contribRow);
}

function renderProjectionTab(container, g, prog) {
  const scenarios = g.scenarios || { aggressive: 2000, moderate: 1500, conservative: 1000 };
  let rate = g.interestRate || 0;
  const events = g.events || [];
  const remaining = Math.max(0, g.targetAmount - prog.total);

  // What-if slider
  const actualRate = calcActualMonthlySavings();
  let sliderVal = actualRate > 0 ? actualRate : scenarios.moderate;
  const sliderWrap = h("div", { style: { marginBottom: "16px" } });
  const sliderLabel = h("div", { className: "slider-row" });
  sliderLabel.appendChild(h("label", {}, "Monthly Savings"));
  const rangeInput = h("input", { type: "range", min: "100", max: "10000", step: "50", value: sliderVal });
  sliderLabel.appendChild(rangeInput);
  const valDisplay = h("span", { className: "slider-val" }, `$${sliderVal.toLocaleString()}/mo`);
  sliderLabel.appendChild(valDisplay);
  sliderWrap.appendChild(sliderLabel);

  const chartWrap = h("div", { className: "projection-chart" });

  function drawProjection(monthly) {
    chartWrap.innerHTML = "";
    const W = 1200, H = 220, PAD = { top: 20, right: 20, bottom: 30, left: 60 };
    const cW = W - PAD.left - PAD.right, cH = H - PAD.top - PAD.bottom;

    // Build 3 scenario lines
    const buildLine = (monthlySave) => {
      const points = []; let bal = prog.total; const maxMonths = 60;
      for (let m = 0; m <= maxMonths; m++) {
        points.push({ month: m, balance: bal });
        if (bal >= g.targetAmount) break;
        // Apply events for this month
        const now = new Date();
        const evDate = new Date(now.getFullYear(), now.getMonth() + m, 1);
        const evKey = `${evDate.getFullYear()}-${String(evDate.getMonth()+1).padStart(2,"0")}`;
        for (const ev of events) { if (ev.date?.slice(0,7) === evKey) bal += ev.amount; }
        bal += monthlySave;
        if (rate > 0) bal *= (1 + rate / 100 / 12);
      }
      return points;
    };

    const aggressive = buildLine(scenarios.aggressive);
    const moderate = buildLine(monthly);
    const conservative = buildLine(scenarios.conservative);
    const allPoints = [...aggressive, ...moderate, ...conservative];
    const maxBal = Math.max(g.targetAmount * 1.1, ...allPoints.map(p => p.balance));
    const maxMonth = Math.max(...allPoints.map(p => p.month));

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`); svg.setAttribute("width", "100%"); svg.style.display = "block";

    const x = m => PAD.left + (m / maxMonth) * cW;
    const y = b => PAD.top + cH - (Math.max(0, b) / maxBal) * cH;

    // Grid lines
    for (let i = 0; i <= 4; i++) {
      const yy = PAD.top + (i / 4) * cH;
      const gridLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
      gridLine.setAttribute("x1", PAD.left); gridLine.setAttribute("x2", W - PAD.right);
      gridLine.setAttribute("y1", yy); gridLine.setAttribute("y2", yy);
      gridLine.setAttribute("stroke", "#E5E7EB"); gridLine.setAttribute("stroke-width", "1");
      svg.appendChild(gridLine);
      const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
      label.setAttribute("x", PAD.left - 8); label.setAttribute("y", yy + 4);
      label.setAttribute("text-anchor", "end"); label.setAttribute("fill", "#9CA3AF"); label.setAttribute("font-size", "10");
      label.textContent = `$${(maxBal * (1 - i/4) / 1000).toFixed(0)}K`;
      svg.appendChild(label);
    }

    // Target line
    const targetLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
    targetLine.setAttribute("x1", PAD.left); targetLine.setAttribute("x2", W - PAD.right);
    targetLine.setAttribute("y1", y(g.targetAmount)); targetLine.setAttribute("y2", y(g.targetAmount));
    targetLine.setAttribute("stroke", "#F59E0B"); targetLine.setAttribute("stroke-width", "1.5"); targetLine.setAttribute("stroke-dasharray", "6,4");
    svg.appendChild(targetLine);
    const targetLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
    targetLabel.setAttribute("x", W - PAD.right); targetLabel.setAttribute("y", y(g.targetAmount) - 6);
    targetLabel.setAttribute("text-anchor", "end"); targetLabel.setAttribute("fill", "#F59E0B"); targetLabel.setAttribute("font-size", "11"); targetLabel.setAttribute("font-weight", "600");
    targetLabel.textContent = `Target: $${g.targetAmount.toLocaleString()}`; svg.appendChild(targetLabel);

    // Draw scenario lines
    const drawLine = (points, color, width, dash = "") => {
      let d = "";
      for (let i = 0; i < points.length; i++) { d += `${i === 0 ? "M" : "L"}${x(points[i].month).toFixed(1)},${y(points[i].balance).toFixed(1)} `; }
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", d); path.setAttribute("fill", "none"); path.setAttribute("stroke", color);
      path.setAttribute("stroke-width", width); if (dash) path.setAttribute("stroke-dasharray", dash);
      svg.appendChild(path);
    };
    drawLine(conservative, "#9CA3AF", "1.5", "4,3");
    drawLine(aggressive, "#059669", "1.5", "4,3");
    drawLine(moderate, g.color || "#1B3A5C", "2.5");

    // Fill area under moderate line
    let fillD = `M${x(moderate[0].month)},${y(0)} `;
    for (const p of moderate) fillD += `L${x(p.month)},${y(p.balance)} `;
    fillD += `L${x(moderate[moderate.length-1].month)},${y(0)} Z`;
    const fill = document.createElementNS("http://www.w3.org/2000/svg", "path");
    fill.setAttribute("d", fillD); fill.setAttribute("fill", `${g.color || "#1B3A5C"}10`); fill.setAttribute("stroke", "none");
    svg.appendChild(fill);

    // Event markers
    const now = new Date();
    for (const ev of events) {
      const evDate = new Date(ev.date);
      const monthDiff = (evDate.getFullYear() - now.getFullYear()) * 12 + evDate.getMonth() - now.getMonth();
      if (monthDiff >= 0 && monthDiff <= maxMonth) {
        const cx = x(monthDiff), cy2 = y(0);
        const marker = document.createElementNS("http://www.w3.org/2000/svg", "line");
        marker.setAttribute("x1", cx); marker.setAttribute("x2", cx);
        marker.setAttribute("y1", PAD.top); marker.setAttribute("y2", H - PAD.bottom);
        marker.setAttribute("stroke", ev.amount > 0 ? "#059669" : "#DC2626");
        marker.setAttribute("stroke-width", "1"); marker.setAttribute("stroke-dasharray", "3,3");
        svg.appendChild(marker);
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", cx); dot.setAttribute("cy", PAD.top + 8);
        dot.setAttribute("r", "4"); dot.setAttribute("fill", ev.amount > 0 ? "#059669" : "#DC2626");
        svg.appendChild(dot);
      }
    }

    // Month labels
    const step = Math.max(1, Math.ceil(maxMonth / 8));
    for (let m = 0; m <= maxMonth; m += step) {
      const mo = new Date(now.getFullYear(), now.getMonth() + m, 1);
      const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
      label.setAttribute("x", x(m)); label.setAttribute("y", H - 6);
      label.setAttribute("text-anchor", "middle"); label.setAttribute("fill", "#9CA3AF"); label.setAttribute("font-size", "10");
      label.textContent = mo.toLocaleDateString("en-US", { month: "short", year: "2-digit" });
      svg.appendChild(label);
    }

    chartWrap.appendChild(svg);

    // Legend
    const legend = h("div", { className: "projection-legend" });
    legend.innerHTML = `<span><span class="dot" style="background:#059669"></span>Aggressive ($${scenarios.aggressive.toLocaleString()}/mo)</span>
      <span><span class="dot" style="background:${g.color||'#1B3A5C'}"></span>Your Rate ($${monthly.toLocaleString()}/mo)</span>
      <span><span class="dot" style="background:#9CA3AF"></span>Conservative ($${scenarios.conservative.toLocaleString()}/mo)</span>
      <span><span class="dot" style="background:#F59E0B"></span>Target</span>`;
    chartWrap.appendChild(legend);

    // Completion estimates
    const findCompletion = (points) => { const hit = points.find(p => p.balance >= g.targetAmount); return hit ? hit.month : null; };
    const estAgg = findCompletion(aggressive);
    const estMod = findCompletion(moderate);
    const estCon = findCompletion(conservative);
    const fmtEst = (months) => {
      if (months === null) return "60+ months";
      const d = new Date(); d.setMonth(d.getMonth() + months);
      return `${d.toLocaleDateString("en-US", { month: "short", year: "numeric" })} (${months}mo)`;
    };
    const estRow = h("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "8px", marginTop: "12px" } });
    const mkEst = (label, val, color) => {
      const d = h("div", { style: { textAlign: "center", padding: "8px", background: "var(--gray-50)", borderRadius: "8px" } });
      d.appendChild(h("div", { style: { fontSize: "11px", color: "var(--gray-500)" } }, label));
      d.appendChild(h("div", { style: { fontSize: "13px", fontWeight: "600", color } }, fmtEst(val)));
      return d;
    };
    estRow.appendChild(mkEst("Aggressive", estAgg, "#059669"));
    estRow.appendChild(mkEst("Your Rate", estMod, g.color || "#1B3A5C"));
    estRow.appendChild(mkEst("Conservative", estCon, "#9CA3AF"));
    chartWrap.appendChild(estRow);
  }

  rangeInput.addEventListener("input", e => { sliderVal = parseInt(e.target.value); valDisplay.textContent = `$${sliderVal.toLocaleString()}/mo`; drawProjection(sliderVal); });
  sliderWrap.appendChild(chartWrap);
  container.appendChild(sliderWrap);

  // Interest rate setting
  const rateRow = h("div", { className: "slider-row", style: { marginTop: "8px" } });
  rateRow.appendChild(h("label", {}, "HYSA Interest Rate"));
  const rateInput = h("input", { type: "range", min: "0", max: "8", step: "0.1", value: rate });
  rateRow.appendChild(rateInput);
  const rateDisplay = h("span", { className: "slider-val" }, `${rate.toFixed(1)}% APY`);
  rateRow.appendChild(rateDisplay);

  container.appendChild(rateRow);

  // Save scenarios button
  const saveRow = h("div", { style: { display: "flex", gap: "8px", marginTop: "12px", alignItems: "center" } });
  const aggInput = h("input", { className: "input input-sm", type: "number", value: scenarios.aggressive, style: { width: "100px" }, placeholder: "Aggressive" });

  const saveScBtn = h("button", { className: "btn btn-sm btn-outline", onClick: async () => {

    const con = parseFloat(conInput.value) || 1000;
    const updated = state.savingsGoals.map(sg => sg.id === g.id ? { ...sg, scenarios: { aggressive: agg, moderate: sliderVal, conservative: con } } : sg);
    await persistGoals(updated); drawProjection(sliderVal);
  }}); saveScBtn.textContent = "Save"; saveRow.appendChild(saveScBtn);

}

      const delTd = h("td", { style: { padding: "6px 4px" } }); const idx = ci;

function calcProjectedCompletion(g) {
  const prog = calcGoalProgress(g, state.transactions);
  if (prog.total >= g.targetAmount) return "Complete!";
  const scenarios = g.scenarios || { aggressive: 2000, moderate: 1500, conservative: 1000 };
  const monthly = scenarios.moderate; const rate = g.interestRate || 0;
  let bal = prog.total;
  for (let m = 1; m <= 120; m++) {
    const evDate = new Date(); evDate.setMonth(evDate.getMonth() + m);
    const evKey = `${evDate.getFullYear()}-${String(evDate.getMonth()+1).padStart(2,"0")}`;
    for (const ev of (g.events || [])) { if (ev.date?.slice(0,7) === evKey) bal += ev.amount; }
    bal += monthly;
    if (rate > 0) bal *= (1 + rate / 100 / 12);
    if (bal >= g.targetAmount) {
      const d = new Date(); d.setMonth(d.getMonth() + m);
      return d.toLocaleDateString("en-US", { month: "short", year: "numeric" });
    }
  }
  return null;
}

// ─── Debt Tracker ────────────────────────────────────────────────
async function persistDebts(d) { state.debts = d; await store.set("pft-debts", d); }

function calcAmortization(balance, annualRate, monthlyPayment, extraMonthly = 0) {
  const schedule = []; let bal = balance; const mr = annualRate / 100 / 12; let month = 0;
  const totalPayment = monthlyPayment + extraMonthly;
  if (totalPayment <= 0 || bal <= 0) return { schedule: [], months: 0, totalInterest: 0, totalPaid: 0 };
  while (bal > 0.01 && month < 600) {
    month++;
    const interest = bal * mr;
    const principal = Math.min(bal, totalPayment - interest);
    if (principal <= 0) return { schedule, months: 999, totalInterest: schedule.reduce((s,r) => s + r.interest, 0), totalPaid: 0 };
    bal = Math.max(0, bal - principal);
    schedule.push({ month, payment: Math.min(totalPayment, principal + interest), principal, interest, balance: bal });
  }
  return { schedule, months: month, totalInterest: schedule.reduce((s, r) => s + r.interest, 0), totalPaid: schedule.reduce((s, r) => s + r.payment, 0) };
}

      bFill += ` L${xFn(maxM)},${yFn(0)} Z`;
      const bf = document.createElementNS("http://www.w3.org/2000/svg", "path");
      bf.setAttribute("d", bFill); bf.setAttribute("fill", "rgba(156,163,175,0.08)"); svg.appendChild(bf);
      const bl = document.createElementNS("http://www.w3.org/2000/svg", "path");
      bl.setAttribute("d", bLine); bl.setAttribute("fill", "none"); bl.setAttribute("stroke", "#D1D5DB");
      bl.setAttribute("stroke-width", "1.5"); bl.setAttribute("stroke-dasharray", "4,3"); svg.appendChild(bl);
    }

    // Current scenario area + line (green)
    let cFill = `M${P.left},${yFn(0)} L${P.left},${yFn(maxBal)}`;
    let cLine = `M${P.left},${yFn(maxBal)}`;
    for (let m = 1; m <= maxM; m++) { cFill += ` L${xFn(m)},${yFn(currentBalances[m])}`; cLine += ` L${xFn(m)},${yFn(currentBalances[m])}`; }
    cFill += ` L${xFn(maxM)},${yFn(0)} Z`;
    const cf = document.createElementNS("http://www.w3.org/2000/svg", "path");
    cf.setAttribute("d", cFill); cf.setAttribute("fill", totalExtra > 0 ? "rgba(16,185,129,0.1)" : "rgba(220,38,38,0.08)"); svg.appendChild(cf);
    const cl = document.createElementNS("http://www.w3.org/2000/svg", "path");
    cl.setAttribute("d", cLine); cl.setAttribute("fill", "none");
    cl.setAttribute("stroke", totalExtra > 0 ? "#10B981" : "#EF4444"); cl.setAttribute("stroke-width", "2.5"); svg.appendChild(cl);

    // Payoff marker

    dot.setAttribute("cx", xFn(currentPayoffMonth)); dot.setAttribute("cy", yFn(0));
    dot.setAttribute("r", "5"); dot.setAttribute("fill", totalExtra > 0 ? "#10B981" : "#EF4444");

    }

    // Live chart container
    const chartContainer = h("div", { className: "projection-chart", style: { marginTop: "12px", marginBottom: "8px" } });

    function drawDebtChart(extra) {
      const a = calcAmortization(d.balance, d.rate, d.minPayment, extra);
      const base = calcAmortization(d.balance, d.rate, d.minPayment, 0);
      const savedMo = base.months - a.months;
      const savedInt = base.totalInterest - a.totalInterest;
      wiResult.textContent = extra > 0 ? `Payoff: ${a.months} months · Save ${savedMo} months & $${savedInt.toLocaleString(undefined,{maximumFractionDigits:0})} interest` : `Payoff: ${a.months} months at minimum payment`;

      chartContainer.innerHTML = "";
      const useSchedule = a.schedule.length > 0 && a.schedule.length < 600;
      if (!useSchedule) return;

      const maxMonths = Math.max(a.months, base.months < 600 ? base.months : a.months);
      const W = 1200, H = 180, PAD = { top: 14, right: 20, bottom: 28, left: 58 };
      const cW = W - PAD.left - PAD.right, cH = H - PAD.top - PAD.bottom;
      const maxBal = d.balance;
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`); svg.setAttribute("width", "100%"); svg.style.display = "block";
      const xFn = m => PAD.left + (m / maxMonths) * cW;
      const yFn = b => PAD.top + cH - (b / maxBal) * cH;

      // Baseline line (gray dashed) if different from current
      if (extra > 0 && base.schedule.length > 0 && base.months < 600) {
        let baseD = `M${PAD.left},${yFn(d.balance)}`;
        for (const r of base.schedule) baseD += ` L${xFn(r.month)},${yFn(r.balance)}`;
        const baseLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
        baseLine.setAttribute("d", baseD); baseLine.setAttribute("fill", "none");
        baseLine.setAttribute("stroke", "#D1D5DB"); baseLine.setAttribute("stroke-width", "1.5");
        baseLine.setAttribute("stroke-dasharray", "4,4"); svg.appendChild(baseLine);
      }

      // Area fill for current scenario
      let fillD = `M${PAD.left},${yFn(0)} L${PAD.left},${yFn(d.balance)}`;
      for (const r of a.schedule) fillD += ` L${xFn(r.month)},${yFn(r.balance)}`;
      fillD += ` L${xFn(a.months)},${yFn(0)} Z`;
      const fill = document.createElementNS("http://www.w3.org/2000/svg", "path");
      fill.setAttribute("d", fillD); fill.setAttribute("fill", extra > 0 ? "rgba(16,185,129,0.1)" : "rgba(220,38,38,0.08)"); svg.appendChild(fill);

      // Current scenario line
      let lineD = `M${PAD.left},${yFn(d.balance)}`;
      for (const r of a.schedule) lineD += ` L${xFn(r.month)},${yFn(r.balance)}`;
      const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
      line.setAttribute("d", lineD); line.setAttribute("fill", "none");
      line.setAttribute("stroke", extra > 0 ? "#10B981" : "#DC2626"); line.setAttribute("stroke-width", "2.5"); svg.appendChild(line);

      // Y label
      const yLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
      yLabel.setAttribute("x", PAD.left - 8); yLabel.setAttribute("y", PAD.top + 4); yLabel.setAttribute("text-anchor", "end");
      yLabel.setAttribute("fill", "#9CA3AF"); yLabel.setAttribute("font-size", "10"); yLabel.textContent = `$${(d.balance/1000).toFixed(0)}K`; svg.appendChild(yLabel);
      // $0 label
      const zLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
      zLabel.setAttribute("x", PAD.left - 8); zLabel.setAttribute("y", yFn(0) + 3); zLabel.setAttribute("text-anchor", "end");
      zLabel.setAttribute("fill", "#9CA3AF"); zLabel.setAttribute("font-size", "10"); zLabel.textContent = "$0"; svg.appendChild(zLabel);
      // Month labels
      const step = Math.max(1, Math.ceil(maxMonths / 6));
      for (let m = 0; m <= maxMonths; m += step) {
        const ml = document.createElementNS("http://www.w3.org/2000/svg", "text");
        ml.setAttribute("x", xFn(m)); ml.setAttribute("y", H - 6); ml.setAttribute("text-anchor", "middle");
        ml.setAttribute("fill", "#9CA3AF"); ml.setAttribute("font-size", "10"); ml.textContent = `${m}mo`; svg.appendChild(ml);
      }
      // Payoff marker
      const marker = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      marker.setAttribute("cx", xFn(a.months)); marker.setAttribute("cy", yFn(0));
      marker.setAttribute("r", "5"); marker.setAttribute("fill", extra > 0 ? "#10B981" : "#DC2626");
      marker.setAttribute("stroke", "white"); marker.setAttribute("stroke-width", "2"); svg.appendChild(marker);

      // Legend
      if (extra > 0 && base.months < 600) {
        const legendY = 10;
        const addLeg = (x, color, dash, text) => {
          const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
          l.setAttribute("x1", x); l.setAttribute("y1", legendY); l.setAttribute("x2", x + 20); l.setAttribute("y2", legendY);
          l.setAttribute("stroke", color); l.setAttribute("stroke-width", "2");
          if (dash) l.setAttribute("stroke-dasharray", "4,4"); svg.appendChild(l);
          const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
          t.setAttribute("x", x + 24); t.setAttribute("y", legendY + 3); t.setAttribute("font-size", "9"); t.setAttribute("fill", "#6B7280");
          t.textContent = text; svg.appendChild(t);
        };
        addLeg(PAD.left + cW - 250, "#D1D5DB", true, `Min only: ${base.months}mo`);
        addLeg(PAD.left + cW - 110, "#10B981", false, `+$${extra}/mo: ${a.months}mo`);
      }

      chartContainer.appendChild(svg);
    }
    drawDebtChart(wiVal);
    wiRange.addEventListener("input", e => {
      wiVal = parseFloat(e.target.value);
      wiNumInput.value = wiVal;
      applyWiVal(wiVal);
    });
    wiNumInput.addEventListener("input", e => {
      const v = parseFloat(e.target.value) || 0;
      wiRange.value = Math.min(v, wiMax);
      applyWiVal(v);
    });
    wiWrap.appendChild(wiRow); wiWrap.appendChild(wiResult); wiWrap.appendChild(chartContainer);
    const wiSave = h("button", { className: "btn btn-sm btn-outline mt-2", onClick: async () => {
      await persistDebts(debts.map(x => x.id === d.id ? { ...x, extraPayment: wiVal } : x)); render();
    }}); wiSave.textContent = "Save extra payment"; wiWrap.appendChild(wiSave);
    card.appendChild(wiWrap);

    wrap.appendChild(card);
  }
  return wrap;
}

function showSnowballVsAvalanche() {
  const debts = state.debts.filter(d => d.balance > 0);
  if (debts.length < 2) return;
  const totalExtra = debts.reduce((s, d) => s + (d.extraPayment || 0), 0);
  const totalMin = debts.reduce((s, d) => s + d.minPayment, 0);
  const budget = totalMin + totalExtra;

  function simulate(sortFn) {
    const ds = debts.map(d => ({ ...d, bal: d.balance }));
    ds.sort(sortFn);
    let months = 0, totalInterest = 0;
    const payoffOrder = [];
    while (ds.some(d => d.bal > 0.01) && months < 600) {
      months++;
      let extra = budget - ds.filter(d => d.bal > 0.01).reduce((s, d) => s + d.minPayment, 0);
      for (const d of ds) {
        if (d.bal <= 0.01) continue;
        const interest = d.bal * d.rate / 100 / 12;
        totalInterest += interest;
        const payment = d.minPayment + Math.max(0, extra);
        extra = Math.max(0, extra - Math.max(0, payment - d.minPayment));
        d.bal = Math.max(0, d.bal + interest - payment);
        if (d.bal <= 0.01 && !payoffOrder.includes(d.name)) payoffOrder.push(d.name);
      }
    }
    return { months, totalInterest, payoffOrder };
  }

  const snowball = simulate((a, b) => a.bal - b.bal);
  const avalanche = simulate((a, b) => b.rate - a.rate);

  const overlay = h("div", { className: "modal-overlay" });
  const modal = h("div", { className: "modal modal-wide" });
  const mheader = h("div", { className: "modal-header" });
  mheader.appendChild(h("h2", { style: { fontSize: "18px", fontWeight: "600" } }, "Snowball vs Avalanche Comparison"));
  mheader.appendChild(h("p", { className: "text-sm mt-2", style: { color: "var(--gray-500)" } }, `Based on $${budget.toLocaleString()}/mo total budget across ${debts.length} debts`));
  modal.appendChild(mheader);

  const mbody = h("div", { className: "modal-body" });
  const grid = h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px" } });

  const mkStrategy = (name, emoji, desc, data, highlight) => {
    const card = h("div", { style: { border: `2px solid ${highlight ? "var(--blue)" : "var(--gray-200)"}`, borderRadius: "16px", padding: "20px", background: highlight ? "#F8FAFF" : "white" } });
    card.appendChild(h("div", { style: { fontSize: "24px", marginBottom: "8px" } }, emoji));
    card.appendChild(h("div", { style: { fontSize: "16px", fontWeight: "600", color: "var(--gray-900)", marginBottom: "4px" } }, name));
    card.appendChild(h("div", { style: { fontSize: "12px", color: "var(--gray-500)", marginBottom: "16px" } }, desc));
    const mkRow = (label, val, color = "var(--gray-900)") => {
      const r = h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: "14px", marginBottom: "8px" } });
      r.appendChild(h("span", { style: { color: "var(--gray-500)" } }, label));
      r.appendChild(h("span", { className: "tabnum", style: { fontWeight: "600", color } }, val));
      return r;
    };
    card.appendChild(mkRow("Payoff Time", `${data.months} months`));
    card.appendChild(mkRow("Total Interest", `$${data.totalInterest.toLocaleString(undefined,{maximumFractionDigits:0})}`, "var(--red)"));
    card.appendChild(h("div", { style: { fontSize: "12px", color: "var(--gray-500)", marginTop: "12px" } }, "Payoff order:"));
    data.payoffOrder.forEach((name, i) => {
      card.appendChild(h("div", { style: { fontSize: "13px", color: "var(--gray-700)", padding: "2px 0" } }, `${i+1}. ${name}`));
    });
    if (highlight) card.appendChild(h("div", { className: "badge badge-green", style: { marginTop: "12px" } }, "Recommended"));
    return card;
  };

  const avWins = avalanche.totalInterest < snowball.totalInterest;
  grid.appendChild(mkStrategy("Snowball", "⛄", "Pay smallest balance first for quick wins", snowball, !avWins));
  grid.appendChild(mkStrategy("Avalanche", "🏔️", "Pay highest interest rate first to save money", avalanche, avWins));
  mbody.appendChild(grid);

  const diff = Math.abs(snowball.totalInterest - avalanche.totalInterest);
  if (diff > 10) {
    mbody.appendChild(h("div", { style: { marginTop: "16px", fontSize: "14px", color: "var(--gray-600)", textAlign: "center" } },
      `${avWins ? "Avalanche" : "Snowball"} saves $${diff.toLocaleString(undefined,{maximumFractionDigits:0})} in interest and ${Math.abs(snowball.months - avalanche.months)} months.`));
  }
  modal.appendChild(mbody);
  const mfooter = h("div", { className: "modal-footer" });
  mfooter.appendChild(h("button", { className: "btn btn-primary", onClick: () => overlay.remove() }, "Got it"));
  modal.appendChild(mfooter); overlay.appendChild(modal); document.body.appendChild(overlay);
}

// ─── Net Worth ───────────────────────────────────────────────────
async function persistAssets(a) { state.assets = a; await store.set("pft-assets", a); }
async function persistSnapshots(s) { state.netWorthSnapshots = s; await store.set("pft-nw-snapshots", s); }

function renderNetWorth() {
  const wrap = h("div");
  const assets = state.assets || [];
  const debts = state.debts || [];
  const snapshots = state.netWorthSnapshots || [];

  const totalAssets = assets.reduce((s, a) => s + a.value, 0);
  const totalLiabilities = debts.reduce((s, d) => s + d.balance, 0);
  const netWorth = totalAssets - totalLiabilities;

  // Summary
  const sumRow = h("div", { className: "stat-row", style: { gridTemplateColumns: "repeat(3, 1fr)" } });
  const mkS = (label, val, cls) => { const c = h("div",{className:"stat-mini"}); c.appendChild(h("div",{className:"label"},label)); c.appendChild(h("div",{className:`value ${cls} tabnum`},val)); return c; };
  sumRow.appendChild(mkS("Total Assets", `$${totalAssets.toLocaleString(undefined,{maximumFractionDigits:0})}`, "positive"));
  sumRow.appendChild(mkS("Total Liabilities", `$${totalLiabilities.toLocaleString(undefined,{maximumFractionDigits:0})}`, "loss"));
  sumRow.appendChild(mkS("Net Worth", `${netWorth >= 0 ? "" : "-"}$${Math.abs(netWorth).toLocaleString(undefined,{maximumFractionDigits:0})}`, netWorth >= 0 ? "positive" : "loss"));
  wrap.appendChild(sumRow);

  // Two column grid
  const grid = h("div", { className: "dash-grid mb-4" });

  // Assets
  const assetsCard = h("div", { className: "card" });
  const assetsHeader = h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" } });
  assetsHeader.appendChild(h("h3", { className: "text-sm font-semibold", style: { color: "var(--gray-700)" } }, "Assets"));
  const addAssetBtn = h("button", { className: "btn btn-sm btn-outline", onClick: () => showAssetModal(null) });
  addAssetBtn.textContent = "+ Add"; assetsHeader.appendChild(addAssetBtn);
  assetsCard.appendChild(assetsHeader);

  if (assets.length === 0) {
    assetsCard.appendChild(h("p", { style: { fontSize: "13px", color: "var(--gray-400)", padding: "20px 0", textAlign: "center" } }, "No assets added yet."));
  }
  for (const a of assets) {
    const row = h("div", { className: "merchant-row" });
    const rleft = h("div");
    rleft.appendChild(h("div", { className: "merchant-name" }, a.name));
    rleft.appendChild(h("div", { className: "merchant-count" }, a.type));
    row.appendChild(rleft);
    const rright = h("div", { style: { display: "flex", alignItems: "center", gap: "8px" } });
    rright.appendChild(h("span", { className: "merchant-amount", style: { color: "var(--green)" } }, `$${a.value.toLocaleString()}`));
    const eBtn = h("button", { className: "cat-btn", style: { padding: "2px" }, onClick: () => showAssetModal(a) }); eBtn.appendChild(icon(ICONS.edit)); rright.appendChild(eBtn);
    const dBtn = h("button", { className: "cat-btn", style: { padding: "2px", color: "var(--gray-300)" }, onClick: async () => { await persistAssets(assets.filter(x => x.id !== a.id)); render(); } });
    dBtn.appendChild(icon(ICONS.trash)); rright.appendChild(dBtn);
    row.appendChild(rright);
    assetsCard.appendChild(row);
  }
  grid.appendChild(assetsCard);

  // Liabilities
  const liabCard = h("div", { className: "card" });
  liabCard.appendChild(h("h3", { className: "text-sm font-semibold mb-4", style: { color: "var(--gray-700)" } }, "Liabilities"));
  if (debts.length === 0) {
    liabCard.appendChild(h("p", { style: { fontSize: "13px", color: "var(--gray-400)", padding: "20px 0", textAlign: "center" } }, "No debts tracked. Add them in the Debt view."));
  }
  for (const d of debts) {
    const row = h("div", { className: "merchant-row" });
    const rleft = h("div");
    rleft.appendChild(h("div", { className: "merchant-name" }, d.name));
    rleft.appendChild(h("div", { className: "merchant-count" }, `${d.type} · ${d.rate}% APR`));
    row.appendChild(rleft);
    row.appendChild(h("span", { className: "merchant-amount", style: { color: "var(--red)" } }, `-$${d.balance.toLocaleString()}`));
    liabCard.appendChild(row);
  }
  grid.appendChild(liabCard);
  wrap.appendChild(grid);

  // Net Worth Over Time
  const snapCard = h("div", { className: "card mb-4" });
  const snapHeader = h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" } });
  snapHeader.appendChild(h("h3", { className: "text-sm font-semibold", style: { color: "var(--gray-700)" } }, "Net Worth Over Time"));
  const snapBtn = h("button", { className: "btn btn-sm btn-primary", onClick: async () => {
    const entry = { date: new Date().toISOString().slice(0, 10), assets: totalAssets, liabilities: totalLiabilities, netWorth };
    const idx = snapshots.findIndex(s => s.date === entry.date);
    const updated = idx >= 0 ? snapshots.map((s, i) => i === idx ? entry : s) : [...snapshots, entry];
    updated.sort((a, b) => a.date.localeCompare(b.date));
    await persistSnapshots(updated); render();
  }});
  snapBtn.textContent = "📸 Take Snapshot"; snapHeader.appendChild(snapBtn);
  snapCard.appendChild(snapHeader);

  if (snapshots.length < 2) {
    snapCard.appendChild(h("p", { style: { fontSize: "13px", color: "var(--gray-400)", textAlign: "center", padding: "20px 0" } },
      snapshots.length === 0 ? "Take your first snapshot to start tracking net worth over time." : "Take one more snapshot to see a chart."));
  } else {
    // Draw net worth chart
    const W = 1200, H = 200, PAD = { top: 20, right: 20, bottom: 30, left: 60 };
    const cW = W - PAD.left - PAD.right, cH = H - PAD.top - PAD.bottom;
    const minNW = Math.min(...snapshots.map(s => s.netWorth));
    const maxNW = Math.max(...snapshots.map(s => s.netWorth));
    const range = maxNW - minNW || 1;

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`); svg.setAttribute("width", "100%"); svg.style.display = "block";

    const xFn = i => PAD.left + (i / (snapshots.length - 1)) * cW;
    const yFn = v => PAD.top + cH - ((v - minNW + range * 0.1) / (range * 1.2)) * cH;

    // Zero line if crosses zero
    if (minNW < 0 && maxNW > 0) {
      const zeroY = yFn(0);
      const zLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
      zLine.setAttribute("x1", PAD.left); zLine.setAttribute("x2", W - PAD.right);
      zLine.setAttribute("y1", zeroY); zLine.setAttribute("y2", zeroY);
      zLine.setAttribute("stroke", "#E5E7EB"); zLine.setAttribute("stroke-width", "1"); zLine.setAttribute("stroke-dasharray", "4,4");
      svg.appendChild(zLine);
    }

    // Area fill
    let fillD = `M${xFn(0)},${yFn(minNW - range * 0.1)}`;
    snapshots.forEach((s, i) => fillD += ` L${xFn(i)},${yFn(s.netWorth)}`);
    fillD += ` L${xFn(snapshots.length - 1)},${yFn(minNW - range * 0.1)} Z`;
    const fill = document.createElementNS("http://www.w3.org/2000/svg", "path");
    fill.setAttribute("d", fillD); fill.setAttribute("fill", netWorth >= 0 ? "rgba(16,185,129,0.1)" : "rgba(220,38,38,0.1)"); svg.appendChild(fill);

    // Line
    let lineD = "";
    snapshots.forEach((s, i) => lineD += `${i === 0 ? "M" : "L"}${xFn(i)},${yFn(s.netWorth)} `);
    const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
    line.setAttribute("d", lineD); line.setAttribute("fill", "none");
    line.setAttribute("stroke", netWorth >= 0 ? "#10B981" : "#DC2626"); line.setAttribute("stroke-width", "2.5"); svg.appendChild(line);

    // Dots
    snapshots.forEach((s, i) => {
      const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      dot.setAttribute("cx", xFn(i)); dot.setAttribute("cy", yFn(s.netWorth)); dot.setAttribute("r", "4");
      dot.setAttribute("fill", s.netWorth >= 0 ? "#10B981" : "#DC2626"); dot.setAttribute("stroke", "white"); dot.setAttribute("stroke-width", "2");
      svg.appendChild(dot);
    });

    // Date labels
    const step = Math.max(1, Math.floor(snapshots.length / 6));
    snapshots.forEach((s, i) => {
      if (i % step !== 0 && i !== snapshots.length - 1) return;
      const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
      label.setAttribute("x", xFn(i)); label.setAttribute("y", H - 6);
      label.setAttribute("text-anchor", "middle"); label.setAttribute("fill", "#9CA3AF"); label.setAttribute("font-size", "10");
      label.textContent = s.date.slice(5); svg.appendChild(label);
    });

    // Y axis labels
    for (let i = 0; i <= 3; i++) {
      const val = minNW - range * 0.1 + (range * 1.2) * (1 - i / 3);
      const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
      label.setAttribute("x", PAD.left - 8); label.setAttribute("y", PAD.top + (i / 3) * cH + 4);
      label.setAttribute("text-anchor", "end"); label.setAttribute("fill", "#9CA3AF"); label.setAttribute("font-size", "10");
      label.textContent = `$${(val / 1000).toFixed(0)}K`; svg.appendChild(label);
    }

    snapCard.appendChild(svg);

// ─── Subscriptions ───────────────────────────────────────────────
function detectSubscriptions() {
  const txns = excludeTransfers(state.transactions).filter(t => t.amount < 0);
  const merchants = {};
  for (const t of txns) {
    const m = extractMerchant(t.description);
    if (!merchants[m]) merchants[m] = [];
    merchants[m].push(t);
  }
  const subs = [];
  for (const [merchant, charges] of Object.entries(merchants)) {
    if (charges.length < 3) continue;
    charges.sort((a, b) => a.date.localeCompare(b.date));
    // Check regularity: similar amounts and roughly monthly intervals
    const amounts = charges.map(c => Math.abs(c.amount));
    const avgAmt = amounts.reduce((s, a) => s + a, 0) / amounts.length;
    const amtVariance = amounts.every(a => Math.abs(a - avgAmt) / avgAmt < 0.15);
    if (!amtVariance) continue;
    // Check intervals
    const intervals = [];
    for (let i = 1; i < charges.length; i++) {
      const d1 = new Date(charges[i-1].date), d2 = new Date(charges[i].date);
      intervals.push(Math.round((d2 - d1) / 86400000));
    }
    const avgInterval = intervals.reduce((s, i) => s + i, 0) / intervals.length;
    // Monthly (25-35 days) or annual (350-380)
    const isMonthly = avgInterval >= 25 && avgInterval <= 35;
    const isAnnual = avgInterval >= 350 && avgInterval <= 380;
    if (!isMonthly && !isAnnual) continue;
    const lastCharge = charges[charges.length - 1];
    const nextDate = new Date(lastCharge.date);
    nextDate.setDate(nextDate.getDate() + Math.round(avgInterval));
    subs.push({
      merchant, amount: Math.round(avgAmt * 100) / 100,
      frequency: isMonthly ? "monthly" : "annual",
      category: lastCharge.category,
      lastBilled: lastCharge.date,
      nextBilling: nextDate.toISOString().slice(0, 10),
      chargeCount: charges.length,
      account: lastCharge.account,
    });
  }
  return subs.sort((a, b) => b.amount - a.amount);
}
